<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#3B82F6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.8" />
    </linearGradient>

    <!-- Clean Swoosh Gradient (Cyan/Blue) -->
    <linearGradient id="cleanSwoosh" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>

    <!-- Metal Slash Gradient (Deep silver/blue) -->
    <linearGradient id="metalSlash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="50%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <!-- Star Glow Gradient -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#22D3EE" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadows and Glows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main Background Container -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="6" filter="url(#shadow)" />

  <!-- Background Grid/Tech Lines for visual depth -->
  <g opacity="0.08">
    <circle cx="256" cy="256" r="180" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="8 8" />
    <circle cx="256" cy="256" r="120" stroke="#FFFFFF" stroke-width="1" />
    <line x1="256" y1="50" x2="256" y2="462" stroke="#FFFFFF" stroke-width="1" />
    <line x1="50" y1="256" x2="462" y2="256" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Glowing background aura behind the logo -->
  <circle cx="256" cy="256" r="100" fill="#3B82F6" opacity="0.15" filter="url(#neonGlow)" />

  <!-- Logo Group -->
  <g filter="url(#shadow)">
    <!-- 1. The Underneath Metal Blade of the X (Bottom-Left to Top-Right) -->
    <path d="M140 372 C160 352, 332 180, 372 140 C382 130, 398 134, 398 148 C398 162, 382 178, 372 188 C332 228, 160 400, 140 400 C126 400, 122 390, 140 372 Z" fill="url(#metalSlash)" opacity="0.8" />
    <path d="M140 372 C160 352, 332 180, 372 140" stroke="#475569" stroke-width="2" stroke-linecap="round" />

    <!-- 2. The Clean/Sweeping Energy Swoosh (Top-Left to Bottom-Right) -->
    <!-- This shape represents dynamic cleaning wind or energy sweeping through the X -->
    <path d="M130 148 C180 130, 330 250, 382 364 C390 380, 382 390, 368 390 C338 390, 290 350, 240 310 C180 262, 110 178, 130 148 Z" fill="url(#cleanSwoosh)" filter="url(#neonGlow)" />
    
    <!-- Highlights on the Swoosh to give a shiny, glassy feel -->
    <path d="M145 160 C185 145, 315 250, 365 355" stroke="#E0F7FA" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <path d="M165 180 C200 170, 300 260, 345 340" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.4" />
    
    <!-- 3. Glassmorphism Intersecting Plate overlaying the Swoosh to create 3D depth -->
    <path d="M190 220 L310 340 L340 310 L220 190 Z" fill="url(#glassGrad)" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.3" />
  </g>

  <!-- 4. Sparkling star at the top-right of the logo representing "Clean/Sparkling" -->
  <g transform="translate(365, 125)">
    <!-- Star Glow -->
    <circle cx="0" cy="0" r="30" fill="url(#starGlow)" opacity="0.8" />
    <!-- 4-point star -->
    <path d="M0 -25 Q0 0 25 0 Q0 0 0 25 Q0 0 -25 0 Q0 0 0 -25 Z" fill="#FFFFFF" />
    <circle cx="0" cy="0" r="4" fill="#E0F7FA" />
  </g>

  <!-- 5. Secondary smaller sparkle to add detail -->
  <g transform="translate(145, 325)">
    <circle cx="0" cy="0" r="15" fill="url(#starGlow)" opacity="0.6" />
    <path d="M0 -12 Q0 0 12 0 Q0 0 0 12 Q0 0 -12 0 Q0 0 0 -12 Z" fill="#FFFFFF" opacity="0.9" />
  </g>

  <!-- 6. Floating energy particles (small glowing dots) -->
  <circle cx="280" cy="180" r="3" fill="#22D3EE" opacity="0.8" filter="url(#neonGlow)" />
  <circle cx="210" cy="330" r="4" fill="#3B82F6" opacity="0.7" filter="url(#neonGlow)" />
  <circle cx="340" cy="260" r="2.5" fill="#8B5CF6" opacity="0.6" filter="url(#neonGlow)" />
</svg>
